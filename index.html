<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Coming Soon — Preview</title></head><body style='margin:0'>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&family=Luxurious+Script&display=swap" rel="stylesheet">

<style>
  /* ====================================================================
     FONTS
     Orliet Pro is a licensed display serif (not on Google Fonts). Drop
     your purchased woff2 files in a /fonts folder next to this file and
     this @font-face block will pick them up automatically. Until then,
     the page falls back to Cormorant Garamond, which is a very close,
     free stand-in — the page looks complete either way.
     ==================================================================== */
  @font-face {
    font-family: 'Orliet Pro';
    src: url('./fonts/OrlietPro-Regular.woff2') format('woff2');
    font-weight: 400 600;
    font-style: normal;
    font-display: swap;
  }

  #atl-preview {
    /* ---------- brand tokens ---------- */
    --bg: #FBF7F1;
    --ink: #221B15;
    --ink-60: rgba(34,27,21,0.62);
    --gold: #A16207;
    --gold-soft: rgba(161,98,7,0.35);
    --a1: #FFD9C7;
    --a2: #F5C4D6;
    --a3: #F3E0AE;
    --ease-fluid: cubic-bezier(.22, .68, .34, 1);

    /* ---------- type stack ---------- */
    --font-display: 'Orliet Pro', 'Cormorant Garamond', Georgia, serif;
    --font-script: 'Luxurious Script', cursive;
    --font-body: 'Montserrat', system-ui, sans-serif;

    /* ---------- 8px spacing scale (spacious / marketing density) ---------- */
    --space-1: .5rem;   /* 8px  */
    --space-2: 1rem;    /* 16px */
    --space-3: 1.5rem;  /* 24px */
    --space-4: 2rem;    /* 32px */
    --space-5: 3rem;    /* 48px */
    --space-6: 4rem;    /* 64px */
    --space-7: 6rem;    /* 96px */

    position: relative;
    isolation: isolate;
    overflow: hidden;
    min-height: 100vh;
    background:
      radial-gradient(70% 55% at 82% 10%, rgba(255,217,199,0.35) 0%, transparent 60%),
      radial-gradient(60% 50% at 8% 92%, rgba(245,196,214,0.28) 0%, transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  #atl-preview * { box-sizing: border-box; }

  /* ================= brand bar — normal flow, never overlaps content ================= */
  #atl-preview .atl__bar {
    position: relative; z-index: 4;
    display: flex; align-items: center; justify-content: center; gap: var(--space-2);
    padding: var(--space-3) var(--space-3) 0;
  }
  #atl-preview .atl__bar-rule { height: 1px; flex: 0 1 90px; background: linear-gradient(90deg, transparent, var(--gold-soft)); }
  #atl-preview .atl__bar-rule--r { background: linear-gradient(270deg, transparent, var(--gold-soft)); }
  #atl-preview .atl__brand {
    font-size: .78rem; font-weight: 500;
    letter-spacing: .42em; text-indent: .42em; text-transform: uppercase;
    color: var(--gold); white-space: nowrap;
  }

  /* ================= main grid ================= */
  #atl-preview .atl__grid {
    position: relative; z-index: 2;
    max-width: 1200px; margin: 0 auto;
    display: grid;
    grid-template-areas: "stage" "copy";
    grid-template-columns: 1fr;
    gap: var(--space-6);
    padding: var(--space-5) var(--space-3) var(--space-6);
  }
  @media (min-width: 900px) {
    #atl-preview .atl__grid {
      grid-template-areas: "copy stage";
      grid-template-columns: 1.05fr .95fr;
      align-items: center;
      gap: var(--space-7);
      padding: var(--space-6) var(--space-4) var(--space-7);
      min-height: calc(100vh - 5.5rem);
    }
  }

  /* ================= copy column ================= */
  #atl-preview .atl__copy {
    grid-area: copy;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    gap: var(--space-3);
  }
  @media (min-width: 900px) {
    #atl-preview .atl__copy { align-items: flex-start; text-align: left; }
  }

  #atl-preview .atl__eyebrow {
    display: inline-flex; align-items: center; gap: var(--space-1);
    font-size: .7rem; font-weight: 500; letter-spacing: .34em; text-indent: .34em; text-transform: uppercase;
    color: var(--gold);
  }
  #atl-preview .atl__eyebrow::before { content: ""; width: 28px; height: 1px; background: var(--gold); }

  #atl-preview .atl__h1 { margin: 0; text-wrap: balance; }
  #atl-preview .atl__h1-line { display: block; overflow: hidden; }
  #atl-preview .atl__h1-line > span {
    display: block; transform: translateY(110%);
    animation: atlLift .9s var(--ease-fluid) forwards;
  }
  #atl-preview .atl__h1-line:nth-child(2) > span { animation-delay: .12s; }
  @keyframes atlLift { to { transform: translateY(0); } }

  #atl-preview .atl__h1-serif {
    font-family: var(--font-display) !important;
    font-weight: 500;
    font-size: clamp(2.6rem, 5.6vw, 4.6rem);
    line-height: 1.08; letter-spacing: -.01em;
    text-transform: none !important;
    color: var(--ink);
  }
  /* No entrance animation on the script line — it must always render
     regardless of whether any animation fires in the host page/editor. */
  #atl-preview .atl__h1-script {
    display: block;
    margin-top: .1em; padding-bottom: .12em; /* room for script swashes/descenders */
    font-family: var(--font-script) !important;
    font-weight: 400;
    font-size: clamp(2.4rem, 5.4vw, 4.1rem);
    line-height: 1.3;
    text-transform: none !important;
  }

  #atl-preview .atl__h1-script-inner {
    background: linear-gradient(100deg, #704404 0%, var(--gold) 40%, #f4960f 55%, var(--gold) 70%, #704404 100%);
    background-size: 200% 100%;
    color: var(--gold) !important; /* fallback if background-clip:text unsupported */
  }
  @supports ((-webkit-background-clip: text) or (background-clip: text)) {
    #atl-preview .atl__h1-script-inner {
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent !important;
      color: transparent !important;
      animation: atlShimmer 6s var(--ease-fluid) infinite;
    }
  }
  @keyframes atlShimmer { 0%,100% { background-position: 0% 0; } 50% { background-position: 100% 0; } }

  #atl-preview .atl__sub {
    margin: 0; max-width: 30rem;
    font-weight: 300; font-size: 1rem;
    line-height: 1.7; letter-spacing: .01em;
    color: var(--ink-60);
  }

  /* ================= countdown — liquid-glass chips ================= */
  #atl-preview .atl__count {
    display: flex; gap: var(--space-2); flex-wrap: wrap; justify-content: center;
    margin-top: var(--space-1);
  }
  @media (min-width: 900px) { #atl-preview .atl__count { justify-content: flex-start; } }
  #atl-preview .atl__chip {
    min-width: 4.5rem; padding: var(--space-2) var(--space-1);
    text-align: center;
    background: rgba(251,247,241,0.5);
    border: 1px solid rgba(161,98,7,0.28);
    border-radius: 14px;
    backdrop-filter: blur(15px) saturate(1.3);
    -webkit-backdrop-filter: blur(15px) saturate(1.3);
    box-shadow: 0 10px 30px -18px rgba(34,27,21,0.35);
    transition: transform .4s var(--ease-fluid), border-color .4s var(--ease-fluid);
  }
  #atl-preview .atl__chip:hover { transform: translateY(-3px); border-color: var(--gold); }
  #atl-preview .atl__chip b {
    display: block;
    font-family: var(--font-display); font-weight: 600;
    font-size: 1.7rem; line-height: 1;
    color: var(--ink); font-variant-numeric: tabular-nums;
  }
  #atl-preview .atl__chip small {
    display: block; margin-top: var(--space-1);
    font-size: .58rem; font-weight: 500; letter-spacing: .22em; text-indent: .22em; text-transform: uppercase;
    color: var(--gold);
  }

  /* ================= email capture — centered row below image + text ================= */
  #atl-preview .atl__form-row {
    position: relative; z-index: 2;
    max-width: 1200px; margin: 0 auto;
    display: flex; justify-content: center;
    padding: 0 var(--space-3) var(--space-6);
  }
  #atl-preview .atl__form-wrap { width: min(24rem, 100%); }
  #atl-preview .atl__form { display: flex; flex-direction: column; gap: var(--space-2); }

  #atl-preview .atl__field {
    display: block; width: 100%;
    background: rgba(251,247,241,0.6);
    border: 1px solid rgba(161,98,7,0.35);
    border-radius: 999px;
    backdrop-filter: blur(15px) saturate(1.3);
    -webkit-backdrop-filter: blur(15px) saturate(1.3);
    box-shadow: 0 14px 36px -22px rgba(34,27,21,0.4);
    transition: border-color .35s var(--ease-fluid), box-shadow .35s var(--ease-fluid);
  }
  #atl-preview .atl__field:focus-within {
    border-color: var(--gold);
    box-shadow: 0 14px 36px -18px rgba(161,98,7,0.5);
  }
  #atl-preview .atl__field input[type="email"] {
    width: 100%; min-width: 0;
    border: 0; outline: none; background: transparent;
    padding: var(--space-2) var(--space-3);
    font-family: var(--font-body); font-weight: 300; font-size: .94rem; letter-spacing: .02em;
    color: var(--ink); text-align: center;
  }
  #atl-preview .atl__field input::placeholder { color: var(--ink-60); }
  #atl-preview .atl__field input:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  #atl-preview .atl__submit {
    cursor: pointer; border: 0; width: 100%; border-radius: 999px;
    padding: var(--space-2) var(--space-3);
    background: linear-gradient(120deg, var(--gold), #db8509);
    color: #fff;
    font-family: var(--font-body); font-weight: 600; font-size: .74rem;
    letter-spacing: .24em; text-indent: .24em; text-transform: uppercase;
    box-shadow: 0 14px 30px -16px rgba(161,98,7,0.55);
    transition: transform .3s var(--ease-fluid), filter .3s var(--ease-fluid);
  }
  #atl-preview .atl__submit:hover { filter: brightness(1.08); transform: translateY(-1px); }
  #atl-preview .atl__submit:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  #atl-preview .atl__msg { margin: 0 0 var(--space-1); font-size: .85rem; letter-spacing: .02em; color: var(--gold); text-align: center; }
  #atl-preview .atl__msg--err { color: #b3402c; }
  #atl-preview .atl__note {
    margin: var(--space-2) 0 0;
    font-size: .64rem; font-weight: 400; letter-spacing: .26em; text-indent: .26em; text-transform: uppercase;
    color: var(--ink-60); text-align: center;
  }

  /* own screen-reader-only class (theme-independent) */
  #atl-preview .atl-sr {
    position: absolute !important; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  /* ================= product stage =================
     Sized with vw units rather than a % of the parent — a % width
     here fights the flex column's own shrink-to-fit sizing and
     produces an unpredictably tiny box (the cause of the shrunken
     arch seen in the earlier version). vw keeps it stable at every
     breakpoint. */
  #atl-preview .atl__stage-col { grid-area: stage; display: flex; flex-direction: column; align-items: center; }
  #atl-preview .atl__arch {
    position: relative;
    width: min(78vw, 320px);
    aspect-ratio: 4 / 5.2;
    border-radius: 999px 999px 26px 26px;
    border: 1px solid rgba(161,98,7,0.4);
    box-shadow:
      inset 0 0 0 10px rgba(251,247,241,0.65),
      0 40px 90px -45px rgba(34,27,21,0.5);
    overflow: hidden;
  }
  @media (min-width: 900px) { #atl-preview .atl__arch { width: min(30vw, 420px); } }

  #atl-preview .atl__aura, #atl-preview .atl__aura::before, #atl-preview .atl__aura::after {
    content: ""; position: absolute; inset: 0;
  }
  #atl-preview .atl__aura { background: linear-gradient(160deg, var(--a1), var(--a2) 48%, var(--a3)); }
  #atl-preview .atl__aura::before {
    background: radial-gradient(55% 45% at 30% 25%, rgba(251,247,241,0.85), transparent 70%);
    mix-blend-mode: screen;
    animation: atlDrift 11s var(--ease-fluid) infinite alternate;
  }
  #atl-preview .atl__aura::after {
    background: radial-gradient(60% 50% at 72% 78%, rgba(243,224,174,0.9), transparent 70%);
    mix-blend-mode: screen; filter: blur(15px);
    animation: atlDrift 13s var(--ease-fluid) infinite alternate-reverse;
  }
  @keyframes atlDrift {
    from { transform: translate3d(-6%, -4%, 0) scale(1); }
    to   { transform: translate3d(6%, 5%, 0) scale(1.15); }
  }

  /* rotating ring of type — inset:0 with no aspect-ratio conflict, so it can
     never render larger than its parent and always stays clipped */
  #atl-preview .atl__ring {
    position: absolute; z-index: 2; top: 0; left: 0;
    width: 100%; height: 100%;
    animation: atlSpin 40s linear infinite;
    pointer-events: none;
  }
  @keyframes atlSpin { to { transform: rotate(360deg); } }
  #atl-preview .atl__ring text {
    font-family: var(--font-body); font-weight: 500;
    font-size: 3.6px; letter-spacing: .32em; text-transform: uppercase;
    fill: rgba(34,27,21,0.38);
  }

  #atl-preview .atl__scene {
    position: absolute; z-index: 3; inset: 0;
    display: grid; place-items: center;
    perspective: 1100px;
    cursor: grab; touch-action: pan-y;
  }
  #atl-preview .atl__scene:active { cursor: grabbing; }
  #atl-preview .atl__obj { position: relative; width: 50%; transform-style: preserve-3d; will-change: transform; }

  #atl-preview .atl__obj img,
  #atl-preview .atl__obj canvas.atl__img {
    display: block; width: 100%; height: auto;
    max-height: 320px; object-fit: contain;
    filter: drop-shadow(0 24px 34px rgba(34,27,21,0.35));
    user-select: none; -webkit-user-drag: none; pointer-events: none;
    transition: opacity .5s var(--ease-fluid);
  }
  #atl-preview .atl__obj.is-processing img { opacity: 0; }
  #atl-preview .atl__glare {
    position: absolute; inset: 0; border-radius: 8px;
    background: linear-gradient(105deg,
      transparent calc(var(--gx, 50%) - 18%),
      rgba(255,255,255,.5) var(--gx, 50%),
      transparent calc(var(--gx, 50%) + 18%));
    mix-blend-mode: screen;
    pointer-events: none;
  }
  #atl-preview .atl__mirror {
    position: absolute; top: 100%; left: 0; width: 100%;
    transform: scaleY(-1) translateY(-2%);
    opacity: .22;
    -webkit-mask-image: linear-gradient(to top, transparent 55%, #000 100%);
            mask-image: linear-gradient(to top, transparent 55%, #000 100%);
    pointer-events: none;
  }
  #atl-preview .atl__shadow {
    position: absolute; z-index: 2; left: 50%; bottom: 7%;
    width: 50%; height: 24px; transform: translateX(-50%);
    background: radial-gradient(50% 50% at 50% 50%, rgba(34,27,21,0.38), transparent 70%);
    filter: blur(15px);
    pointer-events: none;
  }
  #atl-preview .atl__dust { position: absolute; z-index: 2; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  #atl-preview .atl__stage-cap {
    margin-top: var(--space-2);
    font-size: .62rem; font-weight: 500; letter-spacing: .3em; text-indent: .3em; text-transform: uppercase;
    color: var(--ink-60); text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    #atl-preview .atl__ring,
    #atl-preview .atl__aura::before,
    #atl-preview .atl__aura::after,
    #atl-preview .atl__h1-script-inner { animation: none; }
    #atl-preview .atl__h1-line > span { animation: none; transform: none; }
  }
</style>

<section id="atl-preview"
  data-atl
  data-gold="#A16207"
  data-ink="#221B15"
  data-knockout="true"
  data-launch="2026-10-01"
  data-countdown="true">

  <header class="atl__bar">

  <div class="atl__grid">

        <span class="atl__h1-line"><span class="atl__h1-serif">Something</span></span>

              <path id="atl-ringpath-preview" d="M 50,65 m -44,0 a 44,44 0 1,1 88,0 a 44,44 0 1,1 -88,0"/>
            </defs>

              <img src="https://images.unsplash.com/photo-1594125311687-3b1b3eafa9f4?q=80&w=900&auto=format&fit=crop"
                   alt="MAISON NOIR perfume bottle" draggable="false" loading="eager">
              <div class="atl__glare" aria-hidden="true"></div>
              <div class="atl__mirror" aria-hidden="true">
                <img src="https://images.unsplash.com/photo-1594125311687-3b1b3eafa9f4?q=80&w=600&auto=format&fit=crop" alt="" draggable="false" loading="lazy">
              </div>
            </div>
          </div>

          <div class="atl__shadow" aria-hidden="true"></div>
        </div>

        <p class="atl__stage-cap">Drag to explore</p>
      </div>
    </div>

  </div>

  <!-- ===== email capture — its own centered row, below image + text ===== -->
  <div class="atl__form-row">
    <div class="atl__form-wrap">
      <form onsubmit='event.preventDefault();alert("(Preview) On Shopify this saves the email to your Customers list.")'>
        <p class="atl__msg" role="status"></p>
        <p class="atl__msg atl__msg--err" role="alert"></p>
        <div class="atl__form">
          <input type="hidden" name="contact[tags]" value="newsletter,coming-soon">
          <div class="atl__field">
            <label class="atl-sr" for="atl-email-preview">Email address</label>
            <input id="atl-email-preview" type="email" name="contact[email]" required
                   autocomplete="email" placeholder="Your email address">
          </div>
          <button type="submit" class="atl__submit">Get early access</button>
        </div>
      </form>
      <p class="atl__note">No spam · Early access · Founder pricing</p>
    </div>
  </div>
</section>

<script>
(function () {
  'use strict';

  function boot() {
    var root = document.getElementById('atl-preview');
    if (!root || root.dataset.atlBooted) return;
    root.dataset.atlBooted = '1';

    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* -------- auto background removal (chroma-key on plain backdrops) -------- */
    if (root.dataset.knockout === 'true') {
      var objWrap = root.querySelector('[data-obj]');
      if (objWrap) objWrap.classList.add('is-processing');
      root.querySelectorAll('.atl__obj img').forEach(function (img) {
        function run() { knockout(img, objWrap); }
        if (img.complete && img.naturalWidth) run();
        else { img.addEventListener('load', run, { once: true }); img.addEventListener('error', function () { reveal(objWrap); }, { once: true }); }
      });
    }
    function reveal(w) { if (w) w.classList.remove('is-processing'); }
    function knockout(img, wrap) {
      try {
        var w = img.naturalWidth, h = img.naturalHeight;
        var max = 1000, k = Math.min(1, max / Math.max(w, h));
        var cw = Math.round(w * k), ch = Math.round(h * k);
        var c = document.createElement('canvas'); c.width = cw; c.height = ch;
        var x = c.getContext('2d', { willReadFrequently: true });
        if (!img.crossOrigin) {
          var clone = new Image();
          clone.crossOrigin = 'anonymous';
          clone.onload = function () { img._src = clone; paint(); };
          clone.onerror = function () { reveal(wrap); };
          clone.src = img.currentSrc || img.src;
          return;
        }
        paint();
        function paint() {
          x.drawImage(img._src || img, 0, 0, cw, ch);
          var d;
          try { d = x.getImageData(0, 0, cw, ch); } catch (e) { reveal(wrap); return; }
          var p = d.data;
          function samp(sx, sy) {
            var r = 0, g = 0, b = 0, n = 0;
            for (var i = 0; i < 6; i++) for (var j = 0; j < 6; j++) {
              var o = (((sy + j) * cw) + (sx + i)) * 4;
              r += p[o]; g += p[o + 1]; b += p[o + 2]; n++;
            }
            return [r / n, g / n, b / n];
          }
          var corners = [samp(0, 0), samp(cw - 7, 0), samp(0, ch - 7), samp(cw - 7, ch - 7)];
          var bgc = [0, 1, 2].map(function (i) {
            return (corners[0][i] + corners[1][i] + corners[2][i] + corners[3][i]) / 4;
          });
          var T1 = 30, T2 = 78;
          for (var o = 0; o < p.length; o += 4) {
            var dr = p[o] - bgc[0], dg = p[o + 1] - bgc[1], db = p[o + 2] - bgc[2];
            var dist = Math.sqrt(dr * dr + dg * dg + db * db);
            var a = (dist - T1) / (T2 - T1);
            a = a < 0 ? 0 : a > 1 ? 1 : a;
            p[o + 3] = Math.min(p[o + 3], Math.round(a * a * (3 - 2 * a) * 255));
          }
          x.putImageData(d, 0, 0);
          img.removeAttribute('srcset'); img.removeAttribute('sizes');
          img.src = c.toDataURL('image/png');
          reveal(wrap);
        }
      } catch (e) { reveal(wrap); }
    }

    /* ---------------- 3D tilt (drag + inertia + idle sway) ---------------- */
    var scene = root.querySelector('[data-scene]');
    var obj = root.querySelector('[data-obj]');
    if (scene && obj) {
      var rx = 0, ry = 0, tx = 0, ty = 0, vy = 0;
      var dragging = false, lx = 0, ly = 0, lt = 0;
      var MAXY = 22, MAXX = 12;

      scene.addEventListener('pointerdown', function (e) {
        dragging = true; vy = 0;
        lx = e.clientX; ly = e.clientY; lt = performance.now();
        scene.setPointerCapture(e.pointerId);
      });
      scene.addEventListener('pointermove', function (e) {
        if (!dragging) return;
        var now = performance.now(), dt = Math.max(now - lt, 8);
        var dx = e.clientX - lx, dy = e.clientY - ly;
        ty = clamp(ty + dx * 0.22, -MAXY, MAXY);
        tx = clamp(tx - dy * 0.14, -MAXX, MAXX);
        vy = (dx * 0.22) / (dt / 16.7);
        lx = e.clientX; ly = e.clientY; lt = now;
      });
      function stop() { dragging = false; }
      scene.addEventListener('pointerup', stop);
      scene.addEventListener('pointercancel', stop);
      scene.addEventListener('pointerleave', stop);

      if (!reduce && window.matchMedia('(pointer: fine)').matches) {
        scene.addEventListener('mousemove', function (e) {
          if (dragging) return;
          var r = scene.getBoundingClientRect();
          ty = ((e.clientX - r.left) / r.width - 0.5) * 14;
          tx = -((e.clientY - r.top) / r.height - 0.5) * 8;
        });
        scene.addEventListener('mouseleave', function () { if (!dragging) { ty = 0; tx = 0; } });
      }

      function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

      var t0 = performance.now();
      (function frame(now) {
        requestAnimationFrame(frame);
        var t = (now - t0) / 1000;

        if (!dragging) {
          ty = clamp(ty + vy, -MAXY, MAXY);
          vy *= 0.92;
          ty += (Math.sin(t * 0.7) * 4 - ty) * 0.015;
          tx += (Math.sin(t * 0.9) * 1.5 - tx) * 0.02;
        }
        rx += (tx - rx) * 0.12;
        ry += (ty - ry) * 0.12;

        var lift = reduce ? 0 : Math.sin(t * 1.1) * 6;
        obj.style.transform =
          'translateY(' + lift.toFixed(2) + 'px)' +
          ' rotateX(' + rx.toFixed(2) + 'deg)' +
          ' rotateY(' + ry.toFixed(2) + 'deg)';
        obj.style.setProperty('--gx', (50 + ry * 2.1).toFixed(1) + '%');
      })(t0);
    }

    /* ---------------- gold-dust particles ---------------- */
    var canvas = root.querySelector('.atl__dust');
    if (canvas && !reduce) {
      var ctx = canvas.getContext('2d');
      var gold = root.dataset.gold || '#a16207';
      var P = [], N = 40, W = 0, H = 0;

      function size() {
        var r = canvas.getBoundingClientRect();
        var d = Math.min(window.devicePixelRatio || 1, 2);
        W = r.width; H = r.height;
        canvas.width = W * d; canvas.height = H * d;
        ctx.setTransform(d, 0, 0, d, 0, 0);
      }
      size();
      if ('ResizeObserver' in window) new ResizeObserver(size).observe(canvas);

      for (var i = 0; i < N; i++) {
        P.push({
          x: Math.random(), y: Math.random(),
          r: 0.6 + Math.random() * 1.5,
          s: 0.0006 + Math.random() * 0.0014,
          p: Math.random() * Math.PI * 2
        });
      }
      (function dust(now) {
        requestAnimationFrame(dust);
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < N; i++) {
          var o = P[i];
          o.y -= o.s; if (o.y < -0.03) { o.y = 1.03; o.x = Math.random(); }
          var tw = 0.35 + 0.65 * Math.abs(Math.sin(now * 0.0012 + o.p));
          ctx.globalAlpha = tw * 0.8;
          ctx.fillStyle = gold;
          ctx.beginPath();
          ctx.arc(o.x * W + Math.sin(now * 0.0008 + o.p) * 6, o.y * H, o.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      })(0);
    }

    /* ---------------- countdown ---------------- */
    var box = root.querySelector('[data-count]');
    if (box && root.dataset.countdown === 'true') {
      var target = new Date((root.dataset.launch || '') + 'T00:00:00');
      if (!isNaN(target.getTime())) {
        var d = box.querySelector('[data-d]'), h = box.querySelector('[data-h]'),
            m = box.querySelector('[data-m]'), s = box.querySelector('[data-s]');
        function pad(n) { return n < 10 ? '0' + n : '' + n; }
        function tick() {
          var diff = Math.max(0, target - Date.now());
          d.textContent = pad(Math.floor(diff / 864e5));
          h.textContent = pad(Math.floor(diff / 36e5) % 24);
          m.textContent = pad(Math.floor(diff / 6e4) % 60);
          s.textContent = pad(Math.floor(diff / 1e3) % 60);
        }
        tick();
        setInterval(tick, 1000);
      } else {
        box.style.display = 'none';
      }
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
  document.addEventListener('shopify:section:load', function (e) {
    if (e.target && e.target.querySelector('#atl-preview')) boot();
  });
})();
</script>

</body></html>
